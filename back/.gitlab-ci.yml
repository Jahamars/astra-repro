variables:
  API_URL: "http://192.168.56.1:8000"
  BUILDER_IMAGE: "registry.astralinux.ru/library/astra/ubi18:latest"

stages:
  - generate
  - verify

# ────────────────────────────────────────────────────────────────
# GENERATE: packages.txt → child.yml
# ────────────────────────────────────────────────────────────────
generate:
  stage: generate
  image: alpine:3.19
  tags: [kubernetes]
  script:
    - |
      printf 'variables:\n  API_URL: "%s"\n  BUILDER_IMAGE: "%s"\nstages:\n  - verify\n' \
        "$API_URL" "$BUILDER_IMAGE" > child.yml

      while IFS= read -r pkg || [ -n "$pkg" ]; do
        [ -z "$pkg" ] && continue
        case "$pkg" in \#*) continue ;; esac

        safe=$(echo "$pkg" | sed 's/[-.]/_/g')
        echo "Adding: $pkg → verify_${safe}"

        cat >> child.yml << ENDJOB

      verify_${safe}:
        stage: verify
        image: \$BUILDER_IMAGE
        tags: [kubernetes]
        variables:
          PKG_NAME: "${pkg}"
        script:
          - |
            set -e
            echo "=== Проверяем: \$PKG_NAME ==="

            apt-get update -qq && apt-get install -y -qq --no-install-recommends \
              curl jq dpkg-dev fakeroot python3 2>/dev/null

            # ── Метаданные ──────────────────────────────────────
            INFO=\$(apt-cache show "\$PKG_NAME" 2>/dev/null)
            VERSION=\$(echo "\$INFO"   | awk '/^Version:/{print \$2; exit}')
            ARCH=\$(echo "\$INFO"      | awk '/^Architecture:/{print \$2; exit}')
            FILENAME=\$(echo "\$INFO"  | awk '/^Filename:/{print \$2; exit}')
            HASH_REPO=\$(echo "\$INFO" | awk '/^SHA256:/{print \$2; exit}')

            [ -n "\$VERSION" ]   || { echo "ERROR: пакет \$PKG_NAME не найден"; exit 1; }
            [ -n "\$HASH_REPO" ] || { echo "ERROR: нет SHA256 для \$PKG_NAME"; exit 1; }
            echo "VERSION=\$VERSION ARCH=\$ARCH HASH_REPO=\$HASH_REPO"

            # ── hash_download ────────────────────────────────────
            mkdir -p /tmp/dl && cd /tmp/dl
            apt-get download "\$PKG_NAME" -qq 2>/dev/null
            DEB=\$(ls *.deb 2>/dev/null | head -1)
            [ -n "\$DEB" ] || { echo "ERROR: download failed"; exit 1; }
            HASH_DOWNLOAD=\$(sha256sum "\$DEB" | awk '{print \$1}')
            echo "HASH_DOWNLOAD=\$HASH_DOWNLOAD"

            # ── POST /packages/versions → PV_ID ─────────────────
            PV=\$(curl -s -X POST "\$API_URL/packages/versions" \
              -H 'Content-Type: application/json' \
              -d "{\"version\":\"\$VERSION\",\"arch\":\"\$ARCH\",\"filename\":\"\$FILENAME\",\"hash_declared\":\"\$HASH_REPO\",\"source_name\":\"\$PKG_NAME\"}")
            echo "PV: \$PV"
            PV_ID=\$(echo "\$PV" | jq -r '.id // empty')
            [ -n "\$PV_ID" ] || { echo "ERROR: нет PV_ID: \$PV"; exit 1; }
            echo "PV_ID=\$PV_ID"

            # ── POST /runs → RUN_ID ──────────────────────────────
            RUN=\$(curl -s -X POST "\$API_URL/runs" \
              -H 'Content-Type: application/json' \
              -d "{\"package_version_id\":\$PV_ID,\"triggered_by\":\"gitlab-ci\"}" || true)
            echo "RUN: \$RUN"
            RUN_ID=\$(echo "\$RUN" | jq -r '.id // empty')
            [ -n "\$RUN_ID" ] || RUN_ID=\$(echo "\$RUN" | jq -r '.detail // ""' \
              | grep -oE '[0-9a-f-]{36}' | head -1)
            [ -n "\$RUN_ID" ] || { echo "ERROR: нет RUN_ID: \$RUN"; exit 1; }
            echo "RUN_ID=\$RUN_ID"

            # ── PUT /runs/{id}/start ─────────────────────────────
            curl -s -X PUT "\$API_URL/runs/\$RUN_ID/start" \
              -H 'Content-Type: application/json' > /dev/null || true

            # ── Сборка из исходников ─────────────────────────────
            HASH_BUILT="" FAILURE="" BUILD_LOG=""
            mkdir -p /tmp/build && cd /tmp/build
            if apt-get source "\$PKG_NAME" -qq 2>/tmp/src.log; then
              SRC_DIR=\$(ls -d \${PKG_NAME}-* 2>/dev/null | head -1)
              if [ -n "\$SRC_DIR" ]; then
                cd "\$SRC_DIR"
                apt-get build-dep -y . -qq 2>/dev/null || true
                BUILD_LOG=\$(dpkg-buildpackage -b -uc -us 2>&1 || true)
                BUILT_DEB=\$(ls /tmp/build/\${PKG_NAME}_*.deb 2>/dev/null | head -1)
                [ -n "\$BUILT_DEB" ] \
                  && HASH_BUILT=\$(sha256sum "\$BUILT_DEB" | awk '{print \$1}') \
                  || FAILURE="no .deb after build"
              else
                FAILURE="source dir not found"
              fi
            else
              FAILURE="apt-get source: \$(tail -2 /tmp/src.log | tr '\n' ' ')"
            fi
            echo "HASH_BUILT=\${HASH_BUILT:-none}"

            # ── POST /runs/{id}/result ───────────────────────────
            H=\$([ -n "\$HASH_BUILT" ] && echo "\"\$HASH_BUILT\"" || echo "null")
            F=\$([ -n "\$FAILURE"    ] && echo "\"\$FAILURE\""    || echo "null")
            L=\$(echo "\$BUILD_LOG" | head -c 4000 \
              | python3 -c "import sys,json;print(json.dumps(sys.stdin.read()))")

            RESULT=\$(curl -s -X POST "\$API_URL/runs/\$RUN_ID/result" \
              -H 'Content-Type: application/json' \
              -d "{\"hash_rebuilt\":\$H,\"build_log\":\$L,\"failure_reason\":\$F,\"build_path\":\"/tmp/build\"}")
            STATUS=\$(echo "\$RESULT" | jq -r '.status // "UNKNOWN"')
            echo "STATUS=\$STATUS"

            echo "repo     : \$HASH_REPO"
            echo "download : \$HASH_DOWNLOAD"
            echo "built    : \${HASH_BUILT:--}"
            [ "\$HASH_REPO" = "\$HASH_DOWNLOAD" ] && echo "✓ зеркало OK" || echo "✗ зеркало FAIL"
            [ -n "\$HASH_BUILT" ] && {
              [ "\$HASH_REPO" = "\$HASH_BUILT" ] && echo "✓ ВОСПРОИЗВОДИМО" || echo "✗ НЕ ВОСПРОИЗВОДИМО"
            } || echo "~ сборка: \$FAILURE"

            case "\$STATUS" in
              NOT_REPRODUCIBLE|NOT_REPRODUCIBLE_CRITICAL) exit 1 ;;
              *) exit 0 ;;
            esac
        allow_failure: true

      ENDJOB
      done < packages.txt

      echo "child.yml: $(wc -l < child.yml) lines"
  artifacts:
    paths: [child.yml]
    expire_in: 1h

# ────────────────────────────────────────────────────────────────
# VERIFY: дочерний pipeline
# ────────────────────────────────────────────────────────────────
verify:
  stage: verify
  needs: [generate]
  trigger:
    include:
      - artifact: child.yml
        job: generate
    strategy: depend
