<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>repro</title>
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>
  <div id="app">
    <nav id="sidebar">
      <div class="logo">
        <span class="logo-mark">⬡</span>
        <span class="logo-name">repro</span>
      </div>
      <nav>
        <a href="#" class="nav-link active" data-view="dashboard"><span class="nav-icon">▪</span>Dashboard</a>
        <a href="#" class="nav-link" data-view="packages"><span class="nav-icon">▪</span>Packages</a>
        <a href="#" class="nav-link" data-view="runs"><span class="nav-icon">▪</span>Runs</a>
        <a href="#" class="nav-link" data-view="issues"><span class="nav-icon">▪</span>Issues</a>
      </nav>
      <div class="sidebar-foot">
        <span id="api-dot" class="dot"></span>
        <span id="api-url"></span>
      </div>
    </nav>

    <main id="content">
      <div id="view-dashboard" class="view"></div>
      <div id="view-packages"  class="view hidden"></div>
      <div id="view-runs"      class="view hidden"></div>
      <div id="view-issues"    class="view hidden"></div>
    </main>
  </div>

  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <button id="modal-close">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="config.js"></script>
  <script src="src/api.js"></script>
  <script src="src/ui.js"></script>
  <script src="src/views/dashboard.js"></script>
  <script src="src/views/packages.js"></script>
  <script src="src/views/runs.js"></script>
  <script src="src/views/issues.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
